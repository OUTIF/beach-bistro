<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#0d3d52" />
  <title>Menu · Twenty Beach Bistro</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    .menu-header {
      background: var(--green-dark);
      color: #fff;
      padding: 72px 20px 28px;
      text-align: center;
    }
    .menu-header h1 { font-size: 2rem; }
    .menu-header p  { color: rgba(245,237,216,0.65); font-size: 0.875rem; margin-top: 4px; }

    /* Sticky filter bar */
    .filter-bar {
      position: sticky; top: 56px; z-index: 90;
      background: rgba(245,237,216,0.93);
      backdrop-filter: blur(6px);
      border-bottom: 1px solid rgba(232,213,176,0.7);
      padding: 10px 16px;
    }
    .filter-bar .pill-row { margin-bottom: 0; }

    /* Category section */
    .cat-section   { margin-bottom: 30px; }
    .cat-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      color: var(--ocean-deep);
      border-bottom: 2px solid rgba(224,123,84,0.3);
      padding-bottom: 6px;
      margin-bottom: 12px;
    }

    /* Menu item card */
    .menu-item {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      background: rgba(255,255,255,0.72);
      border: 1px solid rgba(232,213,176,0.5);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 10px;
    }
    .menu-item-img {
      width: 72px; height: 72px;
      border-radius: 10px;
      object-fit: cover;
      flex-shrink: 0;
      background: linear-gradient(135deg, rgba(26,95,122,0.15), rgba(224,123,84,0.15));
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem;
    }
    .menu-item-body { flex: 1; min-width: 0; }
    .menu-item-top  { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
    .menu-item-name { font-weight: 700; color: var(--ocean-deep); font-family: 'Playfair Display', serif; font-size: 0.95rem; line-height: 1.3; }
    .menu-item-price { color: var(--coral); font-weight: 700; font-size: 0.9rem; white-space: nowrap; font-variant-numeric: tabular-nums; }
    .menu-item-desc { font-size: 0.8rem; color: rgba(92,74,50,0.65); margin-top: 5px; line-height: 1.4; }

    /* Skeleton */
    .skel-item { height: 90px; margin-bottom: 10px; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <a href="../index.html" class="navbar-brand"><img src="../logo.jpg" alt="Logo" class="navbar-logo" /> Twenty <span>&nbsp;Beach</span></a>
  <div class="navbar-links">
    <a href="../index.html"   class="nav-link">Home</a>
    <a href="menu.html"       class="nav-link active">Menu</a>
  </div>
</nav>

<!-- HEADER -->
<div class="menu-header">
  <h1>Our Menu</h1>
  <p>Fresh · Local · Coastal</p>
</div>

<!-- FILTER BAR -->
<div class="filter-bar">
  <div class="pill-row" id="filter-pills">
    <button class="pill active" data-cat="all" onclick="filterCat(this)">All</button>
  </div>
</div>

<!-- MENU LIST -->
<div class="page-wrap pt-nav pb-footer" style="padding-top:16px">
  <div id="menu-skeletons" class="gap-stack">
    <div class="skeleton skel-item"></div>
    <div class="skeleton skel-item"></div>
    <div class="skeleton skel-item"></div>
    <div class="skeleton skel-item"></div>
  </div>

  <div id="menu-error" class="hidden" style="text-align:center;padding:40px 0">
    <p style="font-size:2rem">😔</p>
    <p class="error-msg" id="menu-error-msg"></p>
  </div>

  <div id="menu-content"></div>
</div>

<footer class="footer">Menu updated regularly · Prices include tax</footer>

<script>
  const EMOJI = { Mains:'🍽️', Starters:'🥗', Breakfast:'🌅', Desserts:'🍮', Drinks:'🥤' }

  let allItems = []

  async function loadMenu() {
    try {
      allItems = await menuFetch()
      buildFilterPills()
      renderMenu(allItems)
    } catch(e) {
      document.getElementById('menu-skeletons').classList.add('hidden')
      document.getElementById('menu-error').classList.remove('hidden')
      document.getElementById('menu-error-msg').textContent = e.message
    }
  }

  function buildFilterPills() {
    const cats = [...new Set(allItems.map(i => i.category))]
    const bar  = document.getElementById('filter-pills')
    cats.forEach(cat => {
      const btn = document.createElement('button')
      btn.className = 'pill'
      btn.dataset.cat = cat
      btn.textContent = cat
      btn.onclick = function() { filterCat(this) }
      bar.appendChild(btn)
    })
  }

  function filterCat(btn) {
    document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'))
    btn.classList.add('active')
    const cat = btn.dataset.cat
    renderMenu(cat === 'all' ? allItems : allItems.filter(i => i.category === cat))
  }

  function renderMenu(items) {
    document.getElementById('menu-skeletons').classList.add('hidden')

    const byCategory = {}
    items.forEach(item => {
      if (!byCategory[item.category]) byCategory[item.category] = []
      byCategory[item.category].push(item)
    })

    const container = document.getElementById('menu-content')
    container.innerHTML = ''

    Object.entries(byCategory).forEach(([cat, catItems]) => {
      const section = document.createElement('div')
      section.className = 'cat-section'
      section.innerHTML = `<h2 class="cat-title">${cat}</h2>`
      catItems.forEach(item => section.appendChild(buildItemEl(item)))
      container.appendChild(section)
    })

    if (items.length === 0) {
      container.innerHTML = '<p style="text-align:center;padding:40px 0;color:rgba(92,74,50,0.4)">No items found.</p>'
    }
  }

  function buildItemEl(item) {
    const div = document.createElement('div')
    div.className = 'menu-item'
    const imgContent = item.image_url
      ? `<img src="${item.image_url}" alt="${item.name}" style="width:72px;height:72px;border-radius:10px;object-fit:cover;flex-shrink:0" loading="lazy"/>`
      : `<div class="menu-item-img">${EMOJI[item.category] || '🍽️'}</div>`
    div.innerHTML = `
      ${imgContent}
      <div class="menu-item-body">
        <div class="menu-item-top">
          <span class="menu-item-name">${item.name}</span>
          <span class="menu-item-price">$${Number(item.price).toFixed(2)}</span>
        </div>
        ${item.description ? `<p class="menu-item-desc">${item.description}</p>` : ''}
      </div>
    `
    return div
  }

  loadMenu()
</script>
</body>
</html>
